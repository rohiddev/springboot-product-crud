# ── Application ────────────────────────────────────────────────────────────
spring.application.name=product-crud
server.port=8080

# ── H2 In-Memory Database ───────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:productdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── H2 Console (browser UI at /h2-console) ──────────────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Seed data ───────────────────────────────────────────────────────────────
spring.sql.init.mode=always

# ── Logging ─────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.demo.product=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Write logs to file as well
logging.file.name=logs/product-crud.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7
